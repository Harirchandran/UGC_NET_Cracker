<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#152238">
  <meta name="description" content="Offline-first, single-student UGC-NET Computer Science preparation operating system.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
  <title>NETCracker AI</title>
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <button class="icon-button mobile-only" id="menuBtn" aria-label="Open navigation">☰</button>
      <div class="brand" data-route="dashboard" role="button" tabindex="0">
        <div class="brand-mark">N</div>
        <div><strong>NETCracker AI</strong><small>UGC-NET CS · Offline first</small></div>
      </div>
      <div class="top-actions">
        <span id="offlineBadge" class="status-pill">Offline ready</span>
        <button class="button ghost compact" id="installBtn" hidden>Install</button>
        <button class="icon-button" id="themeBtn" aria-label="Toggle theme">◐</button>
      </div>
    </header>

    <aside class="sidebar" id="sidebar" aria-label="Primary navigation">
      <nav id="navList">
        <button data-route="dashboard" class="nav-item active"><span>⌂</span>Dashboard</button>
        <button data-route="plan" class="nav-item"><span>▣</span>Study plan</button>
        <button data-route="syllabus" class="nav-item"><span>☷</span>Syllabus map</button>
        <button data-route="learn" class="nav-item"><span>◎</span>Learn</button>
        <button data-route="practice" class="nav-item"><span>✓</span>Practice</button>
        <button data-route="mock" class="nav-item"><span>◷</span>Full mock</button>
        <button data-route="revision" class="nav-item"><span>↻</span>Revision</button>
        <button data-route="mistakes" class="nav-item"><span>!</span>Mistakes</button>
        <button data-route="analytics" class="nav-item"><span>▥</span>Analytics</button>
        <button data-route="papers" class="nav-item"><span>▤</span>Previous-year papers</button>
        <button data-route="questions" class="nav-item"><span>⌕</span>Question bank</button>
        <button data-route="tutor" class="nav-item"><span>✦</span>AI tutor <em id="aiNavLock">locked</em></button>
        <button data-route="sources" class="nav-item"><span>§</span>Official sources</button>
        <button data-route="settings" class="nav-item"><span>⚙</span>Settings</button>
      </nav>
      <div class="sidebar-foot">
        <div class="mini-progress"><span id="sideProgressText">0% mastered</span><div><i id="sideProgressBar"></i></div></div>
        <small>Data stays in this browser unless you export it.</small>
      </div>
    </aside>

    <main id="main" class="main" tabindex="-1"></main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="modalRoot"></div>
  <script src="data/bundle.js"></script>
  <script src="data/pyq-index.js"></script>
  <script src="data/lessons.js"></script>
  <script src="app.js"></script>
</body>
</html>
